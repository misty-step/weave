app = "weave-release-events"
primary_region = "iad"

[build]
  dockerfile = "apps/release-events/Dockerfile"

[env]
  RELEASE_EVENTS_ADDR = "0.0.0.0:8080"
  RELEASE_EVENTS_ROOT = "/data/events"
  RUST_LOG = "weave_release_events=info,tower_http=warn"

[[mounts]]
  source = "release_events_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"
    protocol = "http"
