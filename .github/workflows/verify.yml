name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify contract schemas, fixtures, and thread replay
        run: ./scripts/verify.sh
